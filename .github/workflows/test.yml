name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install pytest pytest-mock pytest-cov -r app/requirements.txt
      - run: python -m pytest app/tests/ -v --tb=short --cov=app/src --cov-report=xml
      - uses: codecov/codecov-action@v6
        with:
          files: coverage.xml
          flags: unittests
          fail_ci_if_error: false
