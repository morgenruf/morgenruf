name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: |
            ghcr.io/morgenruf/morgenruf:latest
            ghcr.io/morgenruf/morgenruf:${{ github.ref_name }}
          labels: |
            org.opencontainers.image.source=https://github.com/morgenruf/morgenruf
            org.opencontainers.image.version=${{ github.ref_name }}
            org.opencontainers.image.licenses=MIT
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign image with Cosign
        run: |
          cosign sign --yes \
            ghcr.io/morgenruf/morgenruf@${{ steps.build.outputs.digest }}

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/morgenruf/morgenruf:${{ github.ref_name }}
          artifact-name: morgenruf-sbom.spdx.json
          output-file: morgenruf-sbom.spdx.json

      - name: Attest SBOM
        run: |
          cosign attest --yes \
            --predicate morgenruf-sbom.spdx.json \
            --type spdx \
            ghcr.io/morgenruf/morgenruf@${{ steps.build.outputs.digest }}

  helm:
    name: Package & Push Helm Chart
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Add Bitnami repo
        run: helm repo add bitnami https://charts.bitnami.com/bitnami && helm repo update

      - name: Update chart dependencies
        run: helm dependency update app/helm/morgenruf

      - name: Login to GHCR OCI
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            --username ${{ github.actor }} \
            --password-stdin

      - name: Package chart
        run: helm package app/helm/morgenruf --destination /tmp/charts

      - name: Push chart to GHCR OCI
        run: helm push /tmp/charts/morgenruf-*.tgz oci://ghcr.io/morgenruf/charts

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [docker, helm]
    steps:
      - uses: actions/checkout@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            morgenruf-sbom.spdx.json
