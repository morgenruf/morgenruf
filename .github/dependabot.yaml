version: 2
updates:
  - package-ecosystem: pip
    directory: /app
    schedule:
      interval: weekly
    labels: [dependencies]

  - package-ecosystem: docker
    directory: /app
    schedule:
      interval: weekly
    labels: [dependencies]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels: [dependencies]

  - package-ecosystem: helm
    directory: /app/helm/morgenruf
    schedule:
      interval: weekly
    labels: [dependencies]
