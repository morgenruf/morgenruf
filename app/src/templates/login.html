<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Morgenruf — Dashboard Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #e6edf3;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }
    .bg-glow {
      position: fixed; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse 70% 50% at 50% 0%, rgba(34,197,94,0.10) 0%, transparent 60%);
    }
    .card {
      position: relative;
      background: #111111;
      border: 1px solid #1f1f1f;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
    }
    .logo { font-size: 32px; margin-bottom: 8px; }
    .brand { font-size: 22px; font-weight: 700; color: #22c55e; letter-spacing: -0.5px; margin-bottom: 4px; }
    .tagline { font-size: 13px; color: #6b7280; margin-bottom: 36px; }
    h1 { font-size: 20px; font-weight: 600; color: #e6edf3; margin-bottom: 8px; }
    p { font-size: 14px; color: #9ca3af; margin-bottom: 32px; line-height: 1.6; }
    .btn-slack {
      display: inline-flex; align-items: center; gap: 10px;
      background: #4A154B; color: #fff; font-weight: 600; font-size: 15px;
      padding: 13px 24px; border-radius: 10px; text-decoration: none;
      transition: all 0.2s ease; border: 1px solid rgba(255,255,255,0.1);
      width: 100%; justify-content: center;
    }
    .btn-slack:hover { background: #611f69; transform: translateY(-1px); box-shadow: 0 8px 32px rgba(74,21,75,0.5); }
    .slack-icon { width: 20px; height: 20px; flex-shrink: 0; }
    .divider { border: none; border-top: 1px solid #1f1f1f; margin: 32px 0; }
    .note { font-size: 12px; color: #4b5563; line-height: 1.6; }
    .note a { color: #22c55e; text-decoration: none; }
    .note a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="card">
    <div class="logo">&#127749;</div>
    <div class="brand">Morgenruf</div>
    <div class="tagline">Your team's morning call</div>
    <h1>Sign in to Dashboard</h1>
    <p>Connect your Slack workspace to manage standups, view reports, and configure your team settings.</p>
    <a href="{{ slack_oauth_url }}" class="btn-slack">
      <svg class="slack-icon" viewBox="0 0 124 124" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M26.3 79.1a13.2 13.2 0 0 1-13.2 13.2A13.2 13.2 0 0 1 0 79.1a13.2 13.2 0 0 1 13.2-13.2H26.3v13.2Z" fill="#E01E5A"/>
        <path d="M32.9 79.1a13.2 13.2 0 0 1 13.2-13.2 13.2 13.2 0 0 1 13.2 13.2v33a13.2 13.2 0 0 1-13.2 13.2 13.2 13.2 0 0 1-13.2-13.2v-33Z" fill="#E01E5A"/>
        <path d="M46.1 26.3A13.2 13.2 0 0 1 32.9 13.2 13.2 13.2 0 0 1 46.1 0a13.2 13.2 0 0 1 13.2 13.2v13.2H46.1Z" fill="#36C5F0"/>
        <path d="M46.1 32.9a13.2 13.2 0 0 1 13.2 13.2 13.2 13.2 0 0 1-13.2 13.2H13a13.2 13.2 0 0 1-13.1-13.2A13.2 13.2 0 0 1 13 32.9h33.1Z" fill="#36C5F0"/>
        <path d="M98.7 46.1a13.2 13.2 0 0 1 13.2-13.2A13.2 13.2 0 0 1 125 46.1a13.2 13.2 0 0 1-13.2 13.2H98.7V46.1Z" fill="#2EB67D"/>
        <path d="M92.1 46.1a13.2 13.2 0 0 1-13.2 13.2 13.2 13.2 0 0 1-13.2-13.2V13a13.2 13.2 0 0 1 13.2-13.2 13.2 13.2 0 0 1 13.2 13.2v33.1Z" fill="#2EB67D"/>
        <path d="M78.9 98.7a13.2 13.2 0 0 1 13.2 13.2 13.2 13.2 0 0 1-13.2 13.2 13.2 13.2 0 0 1-13.2-13.2V98.7h13.2Z" fill="#ECB22E"/>
        <path d="M78.9 92.1a13.2 13.2 0 0 1-13.2-13.2 13.2 13.2 0 0 1 13.2-13.2H112a13.2 13.2 0 0 1 13.2 13.2A13.2 13.2 0 0 1 112 92.1H78.9Z" fill="#ECB22E"/>
      </svg>
      Connect with Slack
    </a>
    <hr class="divider"/>
    <p class="note">
      By connecting, you agree to our
      <a href="https://morgenruf.dev/terms.html" target="_blank">Terms of Service</a>
      and <a href="https://morgenruf.dev/privacy.html" target="_blank">Privacy Policy</a>.
      Morgenruf is free and open-source forever.
    </p>
  </div>
</body>
</html>
