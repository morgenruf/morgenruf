apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "morgenruf.fullname" . }}
  labels:
    {{- include "morgenruf.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "morgenruf.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "morgenruf.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "src/migrate.py"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "morgenruf.fullname" . }}-secret
                  key: DATABASE_URL
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      containers:
        - name: morgenruf
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 3000
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
          env:
            - name: PORT
              value: "3000"
            - name: SLACK_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "morgenruf.fullname" . }}-secret
                  key: SLACK_CLIENT_ID
            - name: SLACK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "morgenruf.fullname" . }}-secret
                  key: SLACK_CLIENT_SECRET
            - name: SLACK_SIGNING_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "morgenruf.fullname" . }}-secret
                  key: SLACK_SIGNING_SECRET
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "morgenruf.fullname" . }}-secret
                  key: DATABASE_URL
            - name: FLASK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "morgenruf.fullname" . }}-secret
                  key: FLASK_SECRET_KEY
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "morgenruf.fullname" . }}-secret
                  key: RESEND_API_KEY
            - name: APP_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "morgenruf.fullname" . }}-secret
                  key: APP_URL
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ include "morgenruf.fullname" . }}-secret
                  key: SENTRY_DSN
            - name: SENTRY_ENV
              valueFrom:
                secretKeyRef:
                  name: {{ include "morgenruf.fullname" . }}-secret
                  key: SENTRY_ENV
          volumeMounts:
            - name: teams-config
              mountPath: /app/teams.yaml
              subPath: teams.yaml
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: teams-config
          configMap:
            name: {{ include "morgenruf.fullname" . }}-teams
