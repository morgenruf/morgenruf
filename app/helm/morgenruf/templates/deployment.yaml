apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "morgenruf.fullname" . }}
  labels:
    {{- include "morgenruf.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "morgenruf.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "morgenruf.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: morgenruf
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "morgenruf.fullname" . }}-secret
                  key: slack-bot-token
            - name: SLACK_SIGNING_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "morgenruf.fullname" . }}-secret
                  key: slack-signing-secret
          volumeMounts:
            - name: teams-config
              mountPath: /app/teams.yaml
              subPath: teams.yaml
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: teams-config
          configMap:
            name: {{ include "morgenruf.fullname" . }}-teams
