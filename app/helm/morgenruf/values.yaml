replicaCount: 1

# imagePullSecrets: []  # Only needed if image is private. Public image: leave commented out.

image:
  repository: morgenruf/morgenruf
  pullPolicy: Always
  tag: "latest"

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: true
  className: "nginx"
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # external-dns.alpha.kubernetes.io/hostname: api.morgenruf.dev
  hosts:
    - host: api.morgenruf.dev
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: morgenruf-tls
      hosts:
        - api.morgenruf.dev

# ---------------------------------------------------------------------------
# Required: Slack OAuth credentials
# Get these from https://api.slack.com/apps → your app → Basic Information
# ---------------------------------------------------------------------------
slack:
  # App Credentials → Client ID (looks like: 1234567890.9876543210)
  clientId: ""
  # App Credentials → Client Secret (32 hex chars)
  clientSecret: ""
  # App Credentials → Signing Secret (32 hex chars, different from client secret)
  signingSecret: ""

# ---------------------------------------------------------------------------
# Required: App URL — the public HTTPS URL where the bot is reachable
# Used for Slack OAuth redirect and dashboard links
# ---------------------------------------------------------------------------
app:
  url: "https://api.your-domain.com"   # ← change this to your domain
  port: "3000"

# PostgreSQL — bundled sub-chart
# Recommended for quick testing only. For production, set enabled: false
# and provide an external DATABASE_URL (managed RDS, CloudNativePG, etc.)
# NOTE: Bitnami images were removed from Docker Hub; you may need to configure
#       a custom registry mirror or use an external database instead.
postgresql:
  enabled: false
  auth:
    username: morgenruf
    password: ""          # auto-generated if empty
    database: morgenruf
  primary:
    persistence:
      enabled: true
      size: 5Gi
  image:
    registry: registry-1.docker.io
    repository: bitnami/postgresql
    tag: "16"

# ---------------------------------------------------------------------------
# Required: External PostgreSQL (recommended)
# Set postgresql.enabled: false (default) and provide DATABASE_URL here.
# Works with: RDS, Cloud SQL, CloudNativePG, Supabase, Neon, plain postgres:16
# Format: postgresql://user:password@host:5432/dbname
# ---------------------------------------------------------------------------
externalDatabase:
  url: ""   # e.g. postgresql://morgenruf:strongpass@db-host:5432/morgenruf

# ---------------------------------------------------------------------------
# Required: Flask session secret — generate with: openssl rand -hex 32
# Used to sign session cookies and HMAC OAuth state tokens.
# ---------------------------------------------------------------------------
flaskSecretKey: ""   # openssl rand -hex 32

# ---------------------------------------------------------------------------
# Optional: Resend API key — for welcome emails on install
# Get from https://resend.com — free tier is sufficient
# ---------------------------------------------------------------------------
resend:
  apiKey: ""

# ---------------------------------------------------------------------------
# Redis — backs morgenruf's active standup DM session store.
#
# Without Redis, sessions live in-memory and are wiped on every pod restart
# (kubectl rollout, node drain, OOM, etc.) — any user mid-standup will see a
# "session expired" message and have to start over. For multi-replica setups
# Redis is mandatory because the in-memory store is per-pod.
#
# Two options:
#   1. Bundled (redis.enabled: true) — chart deploys a tiny redis:7-alpine
#      Deployment + Service. Memory-only (no PVC); 4h session TTL means a
#      restart drops at most a few hours of in-flight standups, which is
#      acceptable for almost all installs. Recommended default.
#   2. External (externalRedis.url) — point at a managed Redis (ElastiCache,
#      Upstash, Memorystore, etc.) for HA and durability.
# ---------------------------------------------------------------------------
redis:
  enabled: true
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  maxmemory: "128mb"
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 192Mi

externalRedis:
  url: ""   # e.g. redis://default:password@redis-host:6379/0

# ---------------------------------------------------------------------------
# Optional: Sentry error monitoring
# ---------------------------------------------------------------------------
sentry:
  dsn: ""
  env: "production"

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /healthz
    port: 3000
  initialDelaySeconds: 15
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /healthz
    port: 3000
  initialDelaySeconds: 10
  periodSeconds: 10

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
