replicaCount: 1

image:
  repository: ghcr.io/morgenruf/morgenruf
  pullPolicy: Always
  tag: "latest"

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: true
  className: "nginx"
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # external-dns.alpha.kubernetes.io/hostname: api.morgenruf.dev
  hosts:
    - host: api.morgenruf.dev
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: morgenruf-tls
      hosts:
        - api.morgenruf.dev

# Slack OAuth credentials
slack:
  clientId: ""
  clientSecret: ""
  signingSecret: ""

# App config
app:
  url: "https://api.morgenruf.dev"
  port: "3000"

# PostgreSQL — bundled (set enabled: false to use external)
postgresql:
  enabled: true
  auth:
    username: morgenruf
    password: ""          # auto-generated if empty
    database: morgenruf
  primary:
    persistence:
      enabled: true
      size: 5Gi
  image:
    tag: "16"

# External PostgreSQL (used when postgresql.enabled: false)
externalDatabase:
  url: ""   # postgresql://user:pass@host:5432/db

# Resend (optional — welcome emails)
resend:
  apiKey: ""

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /healthz
    port: 3000
  initialDelaySeconds: 15
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /healthz
    port: 3000
  initialDelaySeconds: 10
  periodSeconds: 10

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
