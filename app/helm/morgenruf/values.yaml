replicaCount: 1

# imagePullSecrets: []  # Only needed if image is private. Public image: leave commented out.

image:
  repository: ghcr.io/morgenruf/morgenruf
  pullPolicy: Always
  tag: "latest"

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: true
  className: "nginx"
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # external-dns.alpha.kubernetes.io/hostname: api.morgenruf.dev
  hosts:
    - host: api.morgenruf.dev
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: morgenruf-tls
      hosts:
        - api.morgenruf.dev

# Slack OAuth credentials
slack:
  clientId: ""
  clientSecret: ""
  signingSecret: ""

# App config
app:
  url: "https://api.morgenruf.dev"
  port: "3000"

# PostgreSQL — bundled sub-chart
# Recommended for quick testing only. For production, set enabled: false
# and provide an external DATABASE_URL (managed RDS, CloudNativePG, etc.)
# NOTE: Bitnami images were removed from Docker Hub; you may need to configure
#       a custom registry mirror or use an external database instead.
postgresql:
  enabled: false
  auth:
    username: morgenruf
    password: ""          # auto-generated if empty
    database: morgenruf
  primary:
    persistence:
      enabled: true
      size: 5Gi
  image:
    registry: registry-1.docker.io
    repository: bitnami/postgresql
    tag: "16"

# External PostgreSQL (recommended for production)
# Set postgresql.enabled: false and provide this URL.
# Works with: RDS, Cloud SQL, CloudNativePG, Supabase, Neon, plain postgres:16
externalDatabase:
  url: ""   # postgresql://user:pass@host:5432/dbname

# Resend (optional — welcome emails)
resend:
  apiKey: ""

flaskSecretKey: ""

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /healthz
    port: 3000
  initialDelaySeconds: 15
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /healthz
    port: 3000
  initialDelaySeconds: 10
  periodSeconds: 10

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
