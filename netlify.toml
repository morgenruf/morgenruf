[build]
  publish = "website"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/github"
  to = "https://github.com/morgenruf/morgenruf"
  status = 301

[[redirects]]
  from = "/docs"
  to = "https://github.com/morgenruf/morgenruf#readme"
  status = 301

[[redirects]]
  from = "/install"
  to = "https://slack.com/oauth/v2/authorize?client_id=10844948237158.1085061485973&scope=chat:write,chat:write.public,im:history,im:read,im:write,channels:read,channels:join,groups:read,users:read,users:read.email,team:read,app_mentions:read&redirect_uri=https://api.morgenruf.dev/oauth/callback"
  status = 302

[[redirects]]
  from = "/slack"
  to = "https://slack.com/oauth/v2/authorize?client_id=10844948237158.1085061485973&scope=chat:write,chat:write.public,im:history,im:read,im:write,channels:read,channels:join,groups:read,users:read,users:read.email,team:read,app_mentions:read&redirect_uri=https://api.morgenruf.dev/oauth/callback"
  status = 302
