display_information:
  name: Morgenruf
  description: "Daily standup bot — structured async standups with per-project tracking"
  background_color: "#0d1117"
  long_description: "Morgenruf runs your team's daily standups directly in Slack. At your configured time, it DMs each team member with 3 questions (Yesterday / Today / Blockers), collects answers privately, and posts a clean formatted summary to your team channel. Supports per-project tagging (Proj-X: ...) for automated reporting. Self-host on Kubernetes or use the hosted version at morgenruf.dev. MIT licensed, free forever."

features:
  app_home:
    home_tab_enabled: false
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  bot_user:
    display_name: Morgenruf
    always_online: true
  slash_commands:
    - command: /standup
      description: Start your daily standup
      usage_hint: ""
      should_escape: false
    - command: /skip
      description: Skip today's standup
      usage_hint: ""
      should_escape: false

oauth_config:
  redirect_urls:
    - https://api.morgenruf.dev/oauth/callback
  scopes:
    bot:
      - chat:write
      - im:history
      - im:read
      - im:write
      - channels:read
      - users:read
      - team:read
      - users:read.email

settings:
  event_subscriptions:
    request_url: https://api.morgenruf.dev/slack/events
    bot_events:
      - message.im
      - app_mention
      - app_home_opened
  interactivity:
    is_enabled: false
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: true
