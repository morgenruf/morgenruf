AWSTemplateFormatVersion: '2010-09-09'
Description: 'Morgenruf Standup Bot — Production (ECS Fargate Spot + RDS + ALB) ~$25/mo'

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label: {default: Slack App Credentials}
        Parameters: [SlackClientId, SlackClientSecret, SlackSigningSecret]
      - Label: {default: App Config}
        Parameters: [AppDomain, FlaskSecretKey]
      - Label: {default: Database}
        Parameters: [DBPassword]
      - Label: {default: HTTPS}
        Parameters: [CertificateArn]

Parameters:
  SlackClientId:
    Type: String
    Description: "Slack App → Basic Information → Client ID"
  SlackClientSecret:
    Type: String
    NoEcho: true
    Description: "Slack App → Basic Information → Client Secret (32 hex chars)"
  SlackSigningSecret:
    Type: String
    NoEcho: true
    Description: "Slack App → Basic Information → Signing Secret (32 hex chars)"
  AppDomain:
    Type: String
    Description: "Your domain (e.g. standup.mycompany.com). Create CNAME → ALBDNSName after deploy."
  FlaskSecretKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: "Leave blank to auto-generate a random 32-byte hex key."
  DBPassword:
    Type: String
    NoEcho: true
    MinLength: 12
    Description: "PostgreSQL password (min 12 chars)"
  CertificateArn:
    Type: String
    Description: "ACM certificate ARN for HTTPS (arn:aws:acm:REGION:ACCOUNT:certificate/ID)"

Resources:

  # ── VPC ────────────────────────────────────────────────────────────────────

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags: [{Key: Name, Value: morgenruf-vpc}]

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags: [{Key: Name, Value: morgenruf-igw}]

  IGWAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # Public subnets (ALB lives here)
  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags: [{Key: Name, Value: morgenruf-public-a}]

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags: [{Key: Name, Value: morgenruf-public-b}]

  # Private subnets (ECS tasks + RDS live here)
  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.11.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags: [{Key: Name, Value: morgenruf-private-a}]

  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.12.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags: [{Key: Name, Value: morgenruf-private-b}]

  # ── Route Tables ───────────────────────────────────────────────────────────

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags: [{Key: Name, Value: morgenruf-public-rt}]

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: IGWAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetARouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetBRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref PublicRouteTable

  # NAT Gateway so ECS Fargate in private subnets can pull from ghcr.io
  NatEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEIP.AllocationId
      SubnetId: !Ref PublicSubnetA
      Tags: [{Key: Name, Value: morgenruf-nat}]

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags: [{Key: Name, Value: morgenruf-private-rt}]

  PrivateDefaultRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnetARouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetA
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnetBRouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetB
      RouteTableId: !Ref PrivateRouteTable

  # ── Security Groups ────────────────────────────────────────────────────────

  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ALB — public HTTP/HTTPS
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - {IpProtocol: tcp, FromPort: 80,  ToPort: 80,  CidrIp: 0.0.0.0/0}
        - {IpProtocol: tcp, FromPort: 443, ToPort: 443, CidrIp: 0.0.0.0/0}
      Tags: [{Key: Name, Value: morgenruf-alb-sg}]

  ECSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ECS tasks — port 3000 from ALB only
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          SourceSecurityGroupId: !Ref ALBSecurityGroup
      Tags: [{Key: Name, Value: morgenruf-ecs-sg}]

  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: RDS — port 5432 from ECS only
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref ECSSecurityGroup
      Tags: [{Key: Name, Value: morgenruf-rds-sg}]

  # ── RDS PostgreSQL ─────────────────────────────────────────────────────────

  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Morgenruf private subnets
      SubnetIds:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB

  DB:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      DBInstanceIdentifier: morgenruf-db
      DBInstanceClass: db.t4g.micro
      Engine: postgres
      EngineVersion: '16'
      MasterUsername: morgenruf
      MasterUserPassword: !Ref DBPassword
      DBName: morgenruf
      AllocatedStorage: '20'
      StorageType: gp3
      MultiAZ: false
      PubliclyAccessible: false
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups: [!Ref RDSSecurityGroup]
      BackupRetentionPeriod: 7
      DeletionProtection: false
      Tags: [{Key: Name, Value: morgenruf-db}]

  # ── Secrets Manager ────────────────────────────────────────────────────────

  AppSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: morgenruf/app
      Description: Morgenruf application environment variables
      SecretString: !Sub |
        {
          "SLACK_CLIENT_ID": "${SlackClientId}",
          "SLACK_CLIENT_SECRET": "${SlackClientSecret}",
          "SLACK_SIGNING_SECRET": "${SlackSigningSecret}",
          "APP_URL": "https://${AppDomain}",
          "DATABASE_URL": "postgresql://morgenruf:${DBPassword}@${DB.Endpoint.Address}:5432/morgenruf",
          "FLASK_SECRET_KEY": "${FlaskSecretKey}"
        }

  # ── CloudWatch Log Group ───────────────────────────────────────────────────

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /morgenruf/app
      RetentionInDays: 30

  # ── IAM — ECS Task Execution Role ─────────────────────────────────────────

  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: morgenruf-ecs-task-execution
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: {Service: ecs-tasks.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: SecretsManagerRead
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref AppSecret
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !GetAtt LogGroup.Arn

  # ── ALB ────────────────────────────────────────────────────────────────────

  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: morgenruf-alb
      Scheme: internet-facing
      Type: application
      Subnets:
        - !Ref PublicSubnetA
        - !Ref PublicSubnetB
      SecurityGroups: [!Ref ALBSecurityGroup]
      Tags: [{Key: Name, Value: morgenruf-alb}]

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: morgenruf-tg
      Port: 3000
      Protocol: HTTP
      TargetType: ip
      VpcId: !Ref VPC
      HealthCheckPath: /healthz
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: '200'

  HTTPListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: '443'
            StatusCode: HTTP_301

  HTTPSListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 443
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref CertificateArn
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  # ── ECS ────────────────────────────────────────────────────────────────────

  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: morgenruf
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE_SPOT
          Weight: 2
        - CapacityProvider: FARGATE
          Weight: 1
      Tags: [{Key: Name, Value: morgenruf}]

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: morgenruf
      Cpu: '256'
      Memory: '512'
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      ContainerDefinitions:
        - Name: morgenruf
          Image: ghcr.io/morgenruf/morgenruf:latest
          Essential: true
          PortMappings:
            - ContainerPort: 3000
              Protocol: tcp
          Secrets:
            - Name: SLACK_CLIENT_ID
              ValueFrom: !Sub "${AppSecret}:SLACK_CLIENT_ID::"
            - Name: SLACK_CLIENT_SECRET
              ValueFrom: !Sub "${AppSecret}:SLACK_CLIENT_SECRET::"
            - Name: SLACK_SIGNING_SECRET
              ValueFrom: !Sub "${AppSecret}:SLACK_SIGNING_SECRET::"
            - Name: APP_URL
              ValueFrom: !Sub "${AppSecret}:APP_URL::"
            - Name: DATABASE_URL
              ValueFrom: !Sub "${AppSecret}:DATABASE_URL::"
            - Name: FLASK_SECRET_KEY
              ValueFrom: !Sub "${AppSecret}:FLASK_SECRET_KEY::"
          HealthCheck:
            Command: ["CMD-SHELL", "curl -f http://localhost:3000/healthz || exit 1"]
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 60
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: /morgenruf/app
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs

  ECSService:
    Type: AWS::ECS::Service
    DependsOn: HTTPSListener
    Properties:
      ServiceName: morgenruf
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: 1
      CapacityProviderStrategy:
        - CapacityProvider: FARGATE_SPOT
          Weight: 2
        - CapacityProvider: FARGATE
          Weight: 1
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - !Ref PrivateSubnetA
            - !Ref PrivateSubnetB
          SecurityGroups: [!Ref ECSSecurityGroup]
          AssignPublicIp: DISABLED
      LoadBalancers:
        - ContainerName: morgenruf
          ContainerPort: 3000
          TargetGroupArn: !Ref TargetGroup
      HealthCheckGracePeriodSeconds: 120
      Tags: [{Key: Name, Value: morgenruf}]

Outputs:
  ALBDNSName:
    Description: "ALB DNS name — create a CNAME record pointing your domain here"
    Value: !GetAtt ALB.DNSName
  AppURL:
    Description: "Your Morgenruf URL"
    Value: !Sub "https://${AppDomain}"
  SlackRedirectURL:
    Description: "Add this to Slack App → OAuth & Permissions → Redirect URLs"
    Value: !Sub "https://${AppDomain}/slack/oauth_redirect"
  DBEndpoint:
    Description: "RDS PostgreSQL endpoint"
    Value: !GetAtt DB.Endpoint.Address
  SecretArn:
    Description: "Secrets Manager ARN storing all app credentials"
    Value: !Ref AppSecret
